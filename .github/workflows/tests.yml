name: Selenium Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # runs daily at 2 AM

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Smoke suite
        run: |
          echo "::group::Smoke Suite"
          mvn clean test -DsuiteXmlFile=testSuites/testng-newregistration.xml -Dbrowser=chrome-headless
          echo "::endgroup"
      - name: Run Regression suite
        run: |
          echo "::group:Regression Suite"
          mvn clean test -DsuiteXmlFile=testSuites/testng-regression.xml -Dbrowser=chrome-headless
          ech "::endgroup"

      - name: Upload Selenium screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: reports/screenshots/**
